<div class="login-container">
  <div class="login-card glass animate-fade">
    <div class="login-header">
      <h1>CIMA Seguros</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" placeholder="Tu usuario" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading" class="loader small"></span>
      </button>

      <div class="login-footer" style="text-align: center; margin-top: 1rem;">
        <p style="color: #94a3b8; font-size: 0.9rem;">
          ¿No tienes cuenta? <a href="javascript:void(0)" (click)="goToRegister()"
            style="color: #60a5fa; text-decoration: none; font-weight: 600;">Regístrate</a>
        </p>
      </div>
    </form>
  </div>
</div>
