<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Crear Cuenta</h2>
            <p>Únete a nuestra plataforma de seguros</p>
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <div class="input-container">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" [(ngModel)]="registerData.username" required
                        placeholder="Ingresa tu usuario">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" [(ngModel)]="registerData.password" required
                        placeholder="Ingresa tu contraseña">
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <div class="input-container">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        [(ngModel)]="registerData.confirmPassword" required placeholder="Repite tu contraseña">
                </div>
            </div>

            <div *ngIf="error" class="error-message">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>

            <button type="submit" class="btn-login" [disabled]="loading || !registerForm.form.valid">
                <span *ngIf="!loading">Registrarse</span>
                <span *ngIf="loading" class="loader"></span>
            </button>

            <div class="login-footer">
                <p>¿Ya tienes una cuenta? <a href="javascript:void(0)" (click)="goToLogin()">Inicia Sesión</a></p>
            </div>
        </form>
    </div>
</div>
